version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: regreso
      POSTGRES_USER: regreso
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regreso"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API (файлы)
      - "9001:9001"   # Web-консоль MinIO
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_NAME: regreso
      DB_USER: regreso
      DB_PASSWORD: secret
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-key-please-change-in-production}
      TELEGRAM_BOT_ENABLED: "false"
      AI_PROVIDER: ${AI_PROVIDER:-stub}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # --- Хранилище файлов ---
      STORAGE_TYPE: minio
      # Внутренний адрес для подключения бэкенда к MinIO (Docker-сеть)
      MINIO_ENDPOINT: http://minio:9000
      # Публичный адрес, который открывает браузер (меняй на домен в production)
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-regreso}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
