spring:
  flyway:
    enabled: false
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

security:
  jwt:
    secret: test-secret-key-for-tests-minimum-32-chars-long
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

telegram:
  bot:
    token: ""
    username: TestBot
    enabled: false

storage:
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: regreso

ai:
  provider: stub
  summary:
    min-prompt-length: 100
    regenerate-cooldown-minutes: 60
