spring:
  application:
    name: regreso
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:regreso}
    username: ${DB_USER:regreso}
    password: ${DB_PASSWORD:secret}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-very-long-secret-key}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:RegresoBot}
    enabled: ${TELEGRAM_BOT_ENABLED:false}

storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:regreso}

reminders:
  scheduler:
    cron: "0 * * * * *"

ai:
  provider: ${AI_PROVIDER:gemini}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
    model: gemini-1.5-flash
  summary:
    min-prompt-length: 100
    regenerate-cooldown-minutes: 60
