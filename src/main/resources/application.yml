cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

spring:
  application:
    name: regreso
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:12MB}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
          timeout: ${MAIL_SMTP_TIMEOUT_MS:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT_MS:5000}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:regreso}
    username: ${DB_USER:regreso}
    password: ${DB_PASSWORD:secret}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-very-long-secret-key}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

app:
  password-reset:
    code-ttl-minutes: ${PASSWORD_RESET_CODE_TTL_MINUTES:15}
    mail-from: ${PASSWORD_RESET_MAIL_FROM:${MAIL_USERNAME:no-reply@regreso.app}}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:RegresoBot}
    enabled: ${TELEGRAM_BOT_ENABLED:false}

upload:
  dir: ${UPLOAD_DIR:${user.home}/regreso-uploads}

storage:
  # "local" — хранение на диске (только для локальной разработки, не для production!)
  # "minio" — S3-совместимое хранилище (production)
  type: ${STORAGE_TYPE:local}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    # public-url — адрес MinIO, который видит браузер.
    # В Docker отличается от endpoint (браузер не знает про hostname "minio").
    # В production: https://cdn.yourdomain.com или https://s3.yourdomain.com
    public-url: ${MINIO_PUBLIC_URL:${MINIO_ENDPOINT:http://localhost:9000}}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:regreso}

reminders:
  scheduler:
    cron: "0 * * * * *"

ai:
  provider: ${AI_PROVIDER:gemini}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
    model: gemini-1.5-flash
  summary:
    min-prompt-length: 100
    regenerate-cooldown-minutes: 60
