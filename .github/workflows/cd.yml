name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────── Build & Push ───────────────────────────
  build:
    name: Build & Push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────── Deploy ───────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload production compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          source: docker-compose.prod.yml
          target: /opt/regreso

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/regreso

            update_env() {
              local key="$1"
              local value="$2"
              if [ -n "$value" ]; then
                grep -q "^${key}=" .env && sed -i "s|^${key}=.*|${key}=${value}|" .env || echo "${key}=${value}" >> .env
              fi
            }
            
            # Обновляем координаты образа в .env
            IMAGE_SHA="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
            IMAGE_REPOSITORY="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
            sed -i "s|^GITHUB_REPOSITORY=.*|GITHUB_REPOSITORY=${IMAGE_REPOSITORY}|" .env
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_SHA}/" .env
            update_env DB_NAME "${{ vars.DB_NAME }}"
            update_env DB_USER "${{ vars.DB_USER }}"
            update_env DB_PASSWORD "${{ secrets.DB_PASSWORD }}"
            update_env JWT_SECRET "${{ secrets.JWT_SECRET }}"
            update_env MINIO_ACCESS_KEY "${{ secrets.MINIO_ACCESS_KEY }}"
            update_env MINIO_SECRET_KEY "${{ secrets.MINIO_SECRET_KEY }}"
            update_env MINIO_BUCKET "${{ vars.MINIO_BUCKET }}"
            update_env MINIO_PUBLIC_URL "${{ vars.MINIO_PUBLIC_URL }}"
            update_env TELEGRAM_BOT_ENABLED "${{ vars.TELEGRAM_BOT_ENABLED }}"
            update_env TELEGRAM_BOT_TOKEN "${{ secrets.TELEGRAM_BOT_TOKEN }}"
            update_env TELEGRAM_BOT_USERNAME "${{ vars.TELEGRAM_BOT_USERNAME }}"
            update_env AI_PROVIDER "${{ vars.AI_PROVIDER }}"
            update_env GEMINI_API_KEY "${{ secrets.GEMINI_API_KEY }}"
            update_env CORS_ALLOWED_ORIGINS "${{ vars.CORS_ALLOWED_ORIGINS }}"
            update_env MAIL_HOST "${{ vars.MAIL_HOST }}"
            update_env MAIL_PORT "${{ vars.MAIL_PORT }}"
            update_env MAIL_USERNAME "${{ vars.MAIL_USERNAME }}"
            update_env MAIL_PASSWORD "${{ secrets.MAIL_PASSWORD }}"
            update_env MAIL_SMTP_AUTH "${{ vars.MAIL_SMTP_AUTH }}"
            update_env MAIL_SMTP_SSL_ENABLE "${{ vars.MAIL_SMTP_SSL_ENABLE }}"
            update_env MAIL_SMTP_STARTTLS "${{ vars.MAIL_SMTP_STARTTLS }}"
            update_env PASSWORD_RESET_MAIL_FROM "${{ vars.PASSWORD_RESET_MAIL_FROM }}"
            update_env PASSWORD_RESET_CODE_TTL_MINUTES "${{ vars.PASSWORD_RESET_CODE_TTL_MINUTES }}"
            
            # Логинимся в GHCR с PAT для pull на удалённом сервере
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            
            # Пуллим новый образ и перезапускаем backend
            docker-compose -f docker-compose.prod.yml pull backend
            docker-compose -f docker-compose.prod.yml rm -sf backend || true
            docker-compose -f docker-compose.prod.yml up -d --no-deps backend
            
            # Чистим старые образы
            docker image prune -f
            
            echo "Deployed ${IMAGE_REPOSITORY}:${IMAGE_SHA} successfully"
